#
# Teenused:
#   analytics-db        — peamine PostgreSQL andmebaas (port 55432)
#   airflow-db          — Airflow metaandmebaas
#   airflow-init        — ühekordne initsialiseerimine
#   airflow-apiserver   — Airflow UI ja REST API (port 8080)
#   airflow-scheduler   — DAG-ide käivitamine
#   airflow-dag-processor — DAG-ide parsimine
#   streamlit           mlit näidikulaud (port 8088)
#
# Käivitamine pärast kohandamist:
#   cp .env.example .env
#   docker compose up -d --build


x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager 
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-db:5432/${AIRFLOW_DB}  
    
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER}
    
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Andmebaasi ühendus Airflow ühenduste jaoks (PostgresHook kasutab seda)
    AIRFLOW_CONN_ANALYTICS_DB: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@analytics-db:5432/${POSTGRES_DB}
    # dbt profiilidele vajalikud muutujad
    POSTGRES_HOST: analytics-db
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}

    # dbt installimine koos Airflow'ga (kasutab BashOperator'it)
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./ingestion:/opt/airflow/ingestion
    - ./sql:/opt/airflow/sql
    - ./dbt_project:/opt/airflow/dbt_project
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    analytics-db:
      condition: service_healthy

services:

  # --- Peamine analüütika andmebaas ---
  analytics-db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: airwolf-analytics-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - analytics-db-volume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # --- Airflow metaandmebaas ---
  airflow-db:
    image: postgres:16
    container_name: airwolf-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # --- Airflow ühekordne initsialiseerimine ---
  airflow-init:
    <<: *airflow-common
    container_name: airwolf-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: "no"

  # --- Airflow API server (UI + REST API) ---
  airflow-apiserver:
    <<: *airflow-common
    container_name: airwolf-airflow-apiserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT_HOST:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    container_name: airwolf-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow DAG processor ---
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airwolf-airflow-dagproc
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: airwolf-dashboard
    env_file:
      - .env
    environment:
      POSTGRES_HOST: analytics-db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REQUIRE_POSTGRES: "1"
    depends_on:
      analytics-db:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT_HOST:-8501}:8501"
    command: ["streamlit", "run", "streamlit_app.py", "--server.address=0.0.0.0"] 



volumes:
  analytics-db-volume:
  airflow-db-volume:
  airflow-logs: