#
# Teenused:
#   analytics-db        — peamine PostgreSQL andmebaas (port 55432)
#   airflow-db          — Airflow metaandmebaas
#   airflow-init        — ühekordne initsialiseerimine
#   airflow-apiserver   — Airflow UI ja REST API (port 8080)
#   airflow-scheduler   — DAG-ide käivitamine
#   airflow-dag-processor — DAG-ide parsimine
#   superset-db         — Superset metaandmebaas
#   superset-init       — Superset ühekordne initsialiseerimine
#   superset            — Superset näidikulaud (port 8088)
#
# Käivitamine pärast kohandamist:
#   cp .env.example .env
#   docker compose up -d --build

services:

  # --- Andmebaas ---
  # Kõigil projektidel on vaja andmebaasi. pgDuckDB toetab nii PostgreSQL-i kui DuckDB päringuid.
  db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: airwolf-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d   # SQL-skriptid, mis käivituvad esimesel korral
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktikum}"]
      interval: 10s
      retries: 5
      start_period: 5s

  # --- Töövoo konteiner (nt Python ETL skript) ---
# --- Airflow metaandmebaas ---
  airflow-db:
    image: postgres:16
    container_name: airwolf-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # --- Airflow ühekordne initsialiseerimine ---
  airflow-init:
    <<: *airflow-common
    container_name: airwolf-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: "no"

  # --- Airflow API server (UI + REST API) ---
  airflow-apiserver:
    <<: *airflow-common
    container_name: airwolf-airflow-apiserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT_HOST:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    container_name: airwolf-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow DAG processor ---
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airwolf-airflow-dagproc
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully


  # --- Näidikulaud ---
  # Streamliti dashboard
  #
  dashboard:
     build:
       context: .
       dockerfile: Dockerfile.app
     container_name: airwolf-dashboard
     env_file:
       - .env
     environment:
       DB_HOST: db
       DB_PORT: "5432"
       DB_USER: ${POSTGRES_USER}
       DB_PASSWORD: ${POSTGRES_PASSWORD}
       DB_NAME: ${POSTGRES_DB}
     depends_on:
       db:
         condition: service_healthy
     ports:
       - "${DASHBOARD_PORT_HOST:-8501}:8501"
     command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0"]

volumes:
  pgdata:
